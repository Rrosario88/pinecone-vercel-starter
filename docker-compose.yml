version: '3.8'

services:
  pdf-rag-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: pdf-rag-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # API Keys (to be provided via .env file)
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT:-gcp-starter}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      # AutoGen Service Configuration
      - AUTOGEN_SERVICE_URL=http://autogen-service:8000
      # Application Configuration
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      # Persist uploaded PDF files
      - pdf_uploads:/app/uploads
      # Optional: logs volume
      - app_logs:/app/logs
    networks:
      - pdf-rag-network
    depends_on:
      - autogen-service
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pdf-rag.rule=Host(`localhost`)"
      - "traefik.http.services.pdf-rag.loadbalancer.server.port=3000"

  autogen-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: autogen-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PORT=8000
      # API Keys (shared with main app)
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT:-gcp-starter}
      - PINECONE_INDEX=${PINECONE_INDEX}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
    volumes:
      # For development - mount source code
      - ./python-service:/app:ro
    networks:
      - pdf-rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.autogen.rule=Host(`localhost`) && PathPrefix(`/autogen`)"
      - "traefik.http.services.autogen.loadbalancer.server.port=8000"

volumes:
  pdf_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/uploads
  app_logs:
    driver: local

networks:
  pdf-rag-network:
    driver: bridge
    name: pdf-rag-network
