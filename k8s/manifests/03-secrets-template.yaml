# Secrets Template - DO NOT commit actual secrets!
# CKA Topic: Secrets - Sensitive configuration data
#
# IMPORTANT: This is a TEMPLATE. Create actual secrets with:
#   kubectl create secret generic api-keys \
#     --from-literal=OPENAI_API_KEY=your-key-here \
#     --from-literal=PINECONE_API_KEY=your-key-here \
#     -n pinecone-rag
#
# Or encode in base64 and apply:
#   echo -n "your-api-key" | base64
#
# Commands to practice:
#   kubectl get secrets -n pinecone-rag
#   kubectl describe secret api-keys -n pinecone-rag
#   kubectl get secret api-keys -n pinecone-rag -o yaml
#   kubectl get secret api-keys -n pinecone-rag -o jsonpath='{.data.OPENAI_API_KEY}' | base64 -d

apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: pinecone-rag
  labels:
    app: pinecone-rag
type: Opaque
data:
  # Base64 encoded values - REPLACE THESE WITH YOUR ACTUAL KEYS!
  # To encode: echo -n "your-api-key" | base64
  # To decode: echo "base64string" | base64 -d

  OPENAI_API_KEY: eW91ci1vcGVuYWkta2V5LWhlcmU=  # your-openai-key-here
  PINECONE_API_KEY: eW91ci1waW5lY29uZS1rZXktaGVyZQ==  # your-pinecone-key-here

  # Add more secrets as needed
  # DOCKER_HUB_TOKEN: ""
  # DATABASE_PASSWORD: ""
