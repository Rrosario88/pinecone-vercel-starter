# Development overrides for docker-compose.yml
# This file automatically extends docker-compose.yml when running docker-compose commands
# Use this for development with hot reloading and volume mounting

version: '3.8'

services:
  pdf-rag-app:
    build:
      target: deps  # Use deps stage for development
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source code for hot reloading
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    ports:
      - "3000:3000"
    # Disable healthcheck in development for faster startup
    healthcheck:
      disable: true